<!doctype html>
<html lang="fr" dir="ltr">

        <meta

            content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://api.alquran.cloud https://api.quran.com https://cdn.jsdelivr.net https://cdn.islamic.network https://everyayah.com https://audio.qurancdn.com https://verses.quran.com https://ia800304.us.archive.org ws://localhost:* http://localhost:*; media-src 'self' blob: https://cdn.islamic.network https://everyayah.com https://audio.qurancdn.com https://verses.quran.com;"

        <link rel="preconnect" href="https://api.alquran.cloud" crossorigin />
        <link rel="preconnect" href="https://api.quran.com" crossorigin />

        />

        <link rel="dns-prefetch" href="https://api.alquran.cloud" />

        />

            rel="stylesheet"

            onload="this.media = 'all'"
        />
