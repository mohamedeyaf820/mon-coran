<!doctype html>
<html lang="fr" dir="ltr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <!-- Content Security Policy -->
        <meta
            http-equiv="Content-Security-Policy"
            content="__CSP_POLICY__"
        />
        <title>MushafPlus - Le Saint Coran</title>
        <!-- Preconnect to all external origins for faster loading -->
        <link rel="preconnect" href="https://cdn.islamic.network" crossorigin />
        <link rel="preconnect" href="https://everyayah.com" crossorigin />
        <link rel="preconnect" href="https://api.alquran.cloud" crossorigin />
        <link rel="preconnect" href="https://api.quran.com" crossorigin />
        <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />
        <link rel="preconnect" href="https://audio.qurancdn.com" crossorigin />
        <link
            rel="preconnect"
            href="https://cdnjs.cloudflare.com"
            crossorigin
        />
        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
        <link rel="preconnect" href="https://fonts.quranwbw.com" crossorigin />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <!-- DNS prefetch for AlQuran API -->
        <link rel="dns-prefetch" href="https://api.alquran.cloud" />
        <link rel="dns-prefetch" href="https://raw.githubusercontent.com" />
        <link rel="dns-prefetch" href="https://fonts.quranwbw.com" />
        <link rel="preload" as="image" href="/logo.png" fetchpriority="high" />
        <!-- Preload critical Quran fonts for faster first render -->
        <link rel="preload" as="font" type="font/woff2" href="/fonts/sura_names.woff2" crossorigin />
        <link rel="preload" as="font" type="font/woff2" href="/fonts/scheherazade-new-400.woff2" crossorigin />
        <!-- Keep Quran fonts lazy via @font-face to avoid a heavy blocking OTF preload on mobile -->
        <link rel="icon" href="/logo.png" type="image/png" />
        <link rel="alternate icon" href="/favicon.svg" type="image/svg+xml" />
        <link rel="manifest" href="/manifest.json" />
        <meta name="theme-color" content="#0D5C4A" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="MushafPlus" />
        <link rel="apple-touch-icon" href="/logo.png" />
    </head>

    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
