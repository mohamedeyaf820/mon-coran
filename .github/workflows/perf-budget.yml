name: Perf Budget

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    env:
      BUDGET_CSS_KB: 940
      BUDGET_JS_KB: 950
      BUDGET_SINGLE_CSS_KB: 525
      BUDGET_SINGLE_JS_KB: 190
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle budget
        run: npm run perf:budget
